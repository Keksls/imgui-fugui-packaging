name: CI

on:
  create:

  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

  workflow_dispatch:
    inputs:
      ReleaseType:
        description: 'Release or Debug'
        required: true
        default: 'Release'

jobs:
  Build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
            architecture: x64
          - os: windows-latest
            architecture: x86
          - os: windows-latest
            architecture: ARM64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Init submodules and checkout fuguiBuild
        run: |
          git submodule update --init cimgui
          cd cimgui
          git checkout fuguiBuild
          git submodule update --init imgui
          cd imgui
          git checkout fuguiBuild
        shell: bash

      - name: Setup .NET
        if: matrix.os == 'windows-latest'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build source package
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        run: dotnet pack -c Release ImGui.NET.SourceBuild.csproj
        shell: bash

      - name: Upload source package
        uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        with:
          name: win-x64-source
          path: bin/Packages/Release/*.nupkg

      - name: Publish untagged source package to MyGet
        if: matrix.os == 'windows-latest' && github.ref == 'refs/heads/master' && matrix.architecture == 'x64'
        run: dotnet nuget push bin/Packages/Release/*.nupkg -s https://www.myget.org/F/mellinoe/api/v3/index.json --api-key ${{secrets.MYGET_KEY}}
        continue-on-error: true

      - name: Publish tagged source package release to nuget.org
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/') && matrix.architecture == 'x64'
        run: dotnet nuget push bin/Packages/Release/*.nupkg -s https://api.nuget.org/v3/index.json --api-key ${{secrets.NUGET_KEY}}
        continue-on-error: true

      - name: Build ${{ github.event.inputs.ReleaseType || 'Release' }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./ci-build.cmd ${{ github.event.inputs.ReleaseType || 'Release' }} ${{ matrix.architecture }}
          else
            ./ci-build.sh ${{ github.event.inputs.ReleaseType || 'Release' }}
          fi
        shell: bash

      - name: Upload win-${{ matrix.architecture }} ${{ github.event.inputs.ReleaseType || 'Release' }}
        uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest'
        with:
          name: win-${{ matrix.architecture }}
          path: cimgui/build/${{ matrix.architecture }}/${{ github.event.inputs.ReleaseType || 'Release' }}/*

      - name: Upload ${{ matrix.os }} ${{ github.event.inputs.ReleaseType || 'Release' }}
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        with:
          name: ${{ matrix.os }}-x64
          path: cimgui/build/${{ github.event.inputs.ReleaseType || 'Release' }}/*

      - name: Upload Json Files
        uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest' && matrix.architecture == 'x64'
        with:
          name: JsonFiles
          path: cimgui/generator/output/*.json

  Build-iOS:
    runs-on: macos-14
    name: Build - iOS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Init submodules and checkout fuguiBuild
        run: |
          git submodule update --init cimgui
          cd cimgui
          git checkout fuguiBuild
          git submodule update --init imgui
          cd imgui
          git checkout fuguiBuild
        shell: bash

      - name: Build cimgui for iPhoneOS
        shell: bash
        run: |
          set -e
          mkdir -p cimgui/build/ios/device

          COMMON_FLAGS="-std=c++17 -fPIC -I cimgui -I cimgui/imgui -DIMGUI_DISABLE_OBSOLETE_FUNCTIONS=0"
          SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"

          xcrun --sdk iphoneos clang++ -arch arm64 -isysroot "$SDK_PATH" -miphoneos-version-min=13.0 -c cimgui/cimgui.cpp $COMMON_FLAGS -o cimgui/build/ios/device/cimgui.o
          xcrun --sdk iphoneos clang++ -arch arm64 -isysroot "$SDK_PATH" -miphoneos-version-min=13.0 -c cimgui/imgui/imgui.cpp $COMMON_FLAGS -o cimgui/build/ios/device/imgui.o
          xcrun --sdk iphoneos clang++ -arch arm64 -isysroot "$SDK_PATH" -miphoneos-version-min=13.0 -c cimgui/imgui/imgui_draw.cpp $COMMON_FLAGS -o cimgui/build/ios/device/imgui_draw.o
          xcrun --sdk iphoneos clang++ -arch arm64 -isysroot "$SDK_PATH" -miphoneos-version-min=13.0 -c cimgui/imgui/imgui_tables.cpp $COMMON_FLAGS -o cimgui/build/ios/device/imgui_tables.o
          xcrun --sdk iphoneos clang++ -arch arm64 -isysroot "$SDK_PATH" -miphoneos-version-min=13.0 -c cimgui/imgui/imgui_widgets.cpp $COMMON_FLAGS -o cimgui/build/ios/device/imgui_widgets.o

          libtool -static -o cimgui/build/ios/device/libcimgui.a \
            cimgui/build/ios/device/cimgui.o \
            cimgui/build/ios/device/imgui.o \
            cimgui/build/ios/device/imgui_draw.o \
            cimgui/build/ios/device/imgui_tables.o \
            cimgui/build/ios/device/imgui_widgets.o

      - name: Build cimgui for iPhoneSimulator
        shell: bash
        run: |
          set -e
          mkdir -p cimgui/build/ios/simulator

          COMMON_FLAGS="-std=c++17 -fPIC -I cimgui -I cimgui/imgui -DIMGUI_DISABLE_OBSOLETE_FUNCTIONS=0"
          SDK_PATH="$(xcrun --sdk iphonesimulator --show-sdk-path)"

          xcrun --sdk iphonesimulator clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-simulator-version-min=13.0 -c cimgui/cimgui.cpp $COMMON_FLAGS -o cimgui/build/ios/simulator/cimgui.o
          xcrun --sdk iphonesimulator clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-simulator-version-min=13.0 -c cimgui/imgui/imgui.cpp $COMMON_FLAGS -o cimgui/build/ios/simulator/imgui.o
          xcrun --sdk iphonesimulator clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-simulator-version-min=13.0 -c cimgui/imgui/imgui_draw.cpp $COMMON_FLAGS -o cimgui/build/ios/simulator/imgui_draw.o
          xcrun --sdk iphonesimulator clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-simulator-version-min=13.0 -c cimgui/imgui/imgui_tables.cpp $COMMON_FLAGS -o cimgui/build/ios/simulator/imgui_tables.o
          xcrun --sdk iphonesimulator clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-simulator-version-min=13.0 -c cimgui/imgui/imgui_widgets.cpp $COMMON_FLAGS -o cimgui/build/ios/simulator/imgui_widgets.o

          libtool -static -o cimgui/build/ios/simulator/libcimgui.a \
            cimgui/build/ios/simulator/cimgui.o \
            cimgui/build/ios/simulator/imgui.o \
            cimgui/build/ios/simulator/imgui_draw.o \
            cimgui/build/ios/simulator/imgui_tables.o \
            cimgui/build/ios/simulator/imgui_widgets.o

      - name: Prepare iOS headers
        shell: bash
        run: |
          set -e
          mkdir -p cimgui/build/ios/headers
          cp cimgui/cimgui.h cimgui/build/ios/headers/
          cp cimgui/cimgui_impl.h cimgui/build/ios/headers/
          cp cimgui/imgui/imgui.h cimgui/build/ios/headers/
          cp cimgui/imgui/imgui_internal.h cimgui/build/ios/headers/
          cp cimgui/imgui/imconfig.h cimgui/build/ios/headers/

      - name: Create cimgui XCFramework
        shell: bash
        run: |
          set -e
          mkdir -p cimgui/build/ios/artifacts

          xcodebuild -create-xcframework \
            -library cimgui/build/ios/device/libcimgui.a -headers cimgui/build/ios/headers \
            -library cimgui/build/ios/simulator/libcimgui.a -headers cimgui/build/ios/headers \
            -output cimgui/build/ios/artifacts/cimgui.xcframework

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: cimgui/build/ios/artifacts/cimgui.xcframework

  CreateReleaseOnTagCreate:
    runs-on: ubuntu-latest
    needs: [Build, Build-iOS]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Rename win-x64 and win-x86 artifacts
        run: |
          mv win-x64/cimgui.dll win-x64/cimgui.win-x64.dll
          mv win-x86/cimgui.dll win-x86/cimgui.win-x86.dll
          mv win-ARM64/cimgui.dll win-ARM64/cimgui.win-arm64.dll

      - name: Zip iOS XCFramework
        run: |
          cd ios-xcframework
          zip -r ../cimgui.xcframework.zip cimgui.xcframework

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            win-x64/cimgui.win-x64.dll
            win-x86/cimgui.win-x86.dll
            win-ARM64/cimgui.win-arm64.dll
            JsonFiles/*
            ubuntu-latest-x64/cimgui.so
            macos-latest-x64/cimgui.dylib
            cimgui.xcframework.zip

  BundleAll:
    runs-on: ubuntu-latest
    needs: [Build, Build-iOS]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Zip all builds
        run: |
          zip -r all-builds.zip all-artifacts

      - name: Upload zip of all builds
        uses: actions/upload-artifact@v4
        with:
          name: all-builds-zip
          path: all-builds.zip